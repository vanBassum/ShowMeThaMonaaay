<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Compare methods — ShowMeThaMonaaay</title>
<style>
  :root { --bg:#14160f; --panel:#1d2016; --line:#2c3020; --txt:#cdd1bf; --dim:#7e836c;
          --gold:#d8b15a; --ok:#8fd14f; --no:#d97a6c; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt);
         font:13px/1.4 "Segoe UI",system-ui,sans-serif; }
  header { display:flex; align-items:center; gap:16px; padding:10px 16px;
           border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--bg); z-index:1; }
  header h1 { font-size:15px; margin:0; color:var(--gold); }
  a { color:var(--gold); text-decoration:none; } a:hover { text-decoration:underline; }
  #meta { margin-left:auto; color:var(--dim); }
  table { width:100%; border-collapse:collapse; }
  th { text-align:left; color:var(--dim); font-weight:600; text-transform:uppercase;
       font-size:11px; letter-spacing:1px; padding:8px; border-bottom:1px solid var(--line); position:sticky; top:43px; background:var(--bg); }
  td { padding:6px 8px; border-bottom:1px solid var(--line); vertical-align:middle; }
  img.icon { height:56px; background:#000; border:1px solid var(--line); border-radius:3px; vertical-align:middle; }
  img.crop { height:56px; background:#000; border:1px solid var(--line); border-radius:3px; }
  .cell { display:flex; align-items:center; gap:8px; }
  .id { color:var(--dim); font-variant-numeric:tabular-nums; }
  .name { font-weight:600; } .name.no { color:var(--no); font-weight:400; font-style:italic; }
  .sub { color:var(--dim); font-size:11px; }
  .score { color:var(--ok); font-variant-numeric:tabular-nums; }
  .future { color:var(--dim); font-style:italic; }
  tr.unid { opacity:.75; }
  .empty { color:var(--dim); padding:30px; text-align:center; }
</style>
</head>
<body>
<header>
  <h1>Compare methods</h1>
  <a href="/">&larr; valuer</a>
  <a href="/inspect">inspect ▸</a>
  <span id="meta"></span>
</header>
<table>
  <thead><tr>
    <th>On screen</th>
    <th>YOLO (icon-id → item) — preferred</th>
    <th>OCR (reads name → catalog)</th>
    <th>used / agree</th>
    <th>Grid/link <span style="text-transform:none">(todo)</span></th>
    <th>conf</th>
  </tr></thead>
  <tbody id="rows"><tr><td colspan="6" class="empty">Press F2 / Scan to populate…</td></tr></tbody>
</table>
<script>
let lastTs = null;
const esc = s => (s||'').replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));

function yoloCell(d){
  // cache icon (what YOLO detected) + the item the non-OCR map resolves it to
  let m = `<div class="cell"><img class="icon" loading="lazy" src="/api/yolo-icon/${d.icon_id}" onerror="this.style.opacity=.2"><div>`;
  if (d.yolo){
    const conf = d.yolo.override ? 'manual'
               : (d.yolo.margin!=null ? `s${d.yolo.score}·m${d.yolo.margin}` : '');
    m += `<div class="name">${esc(d.yolo.short||d.yolo.name)}</div>`
       + `<div class="sub">#${d.icon_id} · ${conf} · cert <b>${d.yolo.certainty}</b></div>`;
  } else {
    m += `<div class="name no">#${d.icon_id} — no map</div>`;
  }
  return m + `</div></div>`;
}
function ocrCell(d){
  const o = d.ocr || {};
  if (o.id){
    return `<div class="cell"><img class="icon" loading="lazy" src="/api/cat-icon/${o.id}" onerror="this.style.opacity=.2"><div>`
         + `<div class="name">${esc(o.short||o.name)}</div>`
         + `<div class="sub">read “${esc(o.raw)}” · <span class="score">${o.score}</span></div></div></div>`;
  }
  return `<div><span class="name no">no match</span><div class="sub">read “${esc(o.raw)}”</div></div>`;
}
function usedCell(d){
  const src = d.source ? `<b style="color:${d.source==='yolo'?'var(--ok)':'var(--gold)'}">${d.source} ${d.certainty}</b>` : '—';
  let agree = '';
  if (d.yolo && d.ocr && d.ocr.id) agree = d.agree ? '<span style="color:var(--ok)">✓ agree</span>'
                                                    : '<span style="color:var(--no)">✗ differ</span>';
  return `${src}<div class="sub">${agree}</div>`;
}
function row(ts, d){
  const ident = !!d.source;
  return `<tr class="${ident?'':'unid'}">`
       + `<td><img class="crop" loading="lazy" src="/api/crop/${ts}?box=${d.box.join(',')}"></td>`
       + `<td>${yoloCell(d)}</td><td>${ocrCell(d)}</td><td>${usedCell(d)}</td>`
       + `<td class="future">—</td><td class="id">${d.det_conf}</td></tr>`;
}
function applyState(s){
  if (s.status && s.status!=='done' && !s.result)
    document.getElementById('meta').textContent = s.status + '…';
  if (!s.result || s.ts === lastTs) return;
  lastTs = s.ts;
  const r = s.result;
  const rows = r.items.concat(r.unidentified).map(d => row(s.ts, d));
  document.getElementById('rows').innerHTML = rows.join('') ||
    '<tr><td colspan="6" class="empty">no detections</td></tr>';
  document.getElementById('meta').textContent =
    `${s.ts} · ${r.identified}/${r.detections} identified (YOLO ${r.by_yolo} · OCR ${r.by_ocr}) · ${r.unidentified.length} unknown`;
}
const ev = new EventSource('/api/stream');
ev.onmessage = e => { try { applyState(JSON.parse(e.data)); } catch(_){} };
</script>
</body>
</html>
