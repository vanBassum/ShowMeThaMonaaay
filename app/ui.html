<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>ShowMeThaMonaaay</title>
<style>
  :root { --bg:#14160f; --panel:#1d2016; --line:#2c3020; --txt:#cdd1bf; --dim:#7e836c;
          --keep:#8fd14f; --ditch:#d97a6c; --gold:#d8b15a; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt);
         font:14px/1.4 "Segoe UI",system-ui,sans-serif; }
  header { display:flex; align-items:center; gap:16px; padding:10px 16px;
           border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--bg); }
  header h1 { font-size:15px; margin:0; color:var(--gold); letter-spacing:.5px; }
  #status { color:var(--dim); }
  #status.scanning { color:var(--gold); }
  #status.error { color:var(--ditch); }
  button { background:var(--panel); color:var(--txt); border:1px solid var(--line);
           padding:6px 14px; border-radius:5px; cursor:pointer; }
  button:hover { border-color:var(--gold); }
  .kbd { border:1px solid var(--line); border-radius:4px; padding:1px 6px; color:var(--dim); }
  main { display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:14px; }
  .col h2 { font-size:13px; text-transform:uppercase; letter-spacing:1px; margin:0 0 8px; }
  .col.keep h2 { color:var(--keep); }
  .col.ditch h2 { color:var(--ditch); }
  table { width:100%; border-collapse:collapse; }
  td { padding:5px 8px; border-bottom:1px solid var(--line); white-space:nowrap; }
  .nm { width:100%; overflow:hidden; text-overflow:ellipsis; }
  .ps { text-align:right; font-variant-numeric:tabular-nums; font-weight:600; }
  .keep .ps { color:var(--keep); } .ditch .ps { color:var(--ditch); }
  .sl { text-align:right; color:var(--dim); font-variant-numeric:tabular-nums; }
  .qty { color:var(--gold); font-size:12px; }
  td.ic { width:40px; padding:3px 4px; }
  img.ic { height:34px; width:34px; object-fit:contain; background:#000;
           border:1px solid var(--line); border-radius:3px; vertical-align:middle; }
  .val { text-align:right; color:var(--dim); font-variant-numeric:tabular-nums; font-size:12px; }
  .empty { color:var(--dim); padding:20px; text-align:center; }
  tbody tr { cursor:pointer; }
  tbody tr:hover { background:var(--panel); }
  #total { color:var(--gold); font-variant-numeric:tabular-nums; font-weight:600; }
  #modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6);
           align-items:flex-start; justify-content:center; z-index:10; }
  #box { background:var(--panel); border:1px solid var(--line); border-radius:8px;
         margin-top:8vh; width:min(560px,92vw); max-height:80vh; display:flex; flex-direction:column; }
  #box h3 { margin:0; padding:12px 14px; border-bottom:1px solid var(--line); font-size:14px; color:var(--gold); }
  #q { margin:12px 14px; padding:9px 12px; background:var(--bg); border:1px solid var(--line);
       border-radius:6px; color:var(--txt); font-size:14px; }
  #results { list-style:none; margin:0; padding:0 6px 10px; overflow:auto; }
  #results li { display:flex; align-items:center; gap:10px; padding:6px 8px; border-radius:6px; cursor:pointer; }
  #results li:hover { background:var(--bg); }
  #results .sub { color:var(--dim); font-size:12px; overflow:hidden; text-overflow:ellipsis; flex:1; }
  #results .ps { color:var(--keep); font-variant-numeric:tabular-nums; }
</style>
</head>
<body>
<header>
  <h1>ShowMeThaMonaaay</h1>
  <button onclick="scanNow()">Scan now</button>
  <span class="kbd">F2</span>
  <a href="/compare" style="color:var(--gold);text-decoration:none">compare ▸</a>
  <a href="/inspect" style="color:var(--gold);text-decoration:none">inspect ▸</a>
  <span id="status">idle</span>
  <span id="total" style="margin-left:auto"></span>
  <span id="counts" style="color:var(--dim)"></span>
</header>
<div id="modal" onclick="if(event.target.id==='modal')closeModal()">
  <div id="box">
    <h3 id="modalTitle">Correct item</h3>
    <input id="q" placeholder="search item name…" oninput="doSearch()" autocomplete="off">
    <ul id="results"></ul>
  </div>
</div>
<main>
  <div class="col keep"><h2>Keep — ₽/slot ↓</h2><table id="keep"></table></div>
  <div class="col ditch"><h2>Ditch — ₽/slot ↑</h2><table id="ditch"></table></div>
</main>
<script>
const fmt = n => (n||0).toLocaleString('en-US');
const esc = s => (s||'').replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
function row(it, ts){
  const qty = it.qty > 1 ? ` <span class="qty">×${it.qty}</span>` : '';
  const ic = (ts && it.box) ? `<img class="ic" loading="lazy" src="/api/crop/${ts}?box=${it.box.join(',')}" onerror="this.style.opacity=.15">` : '';
  return `<tr onclick="openCorrect('${it.icon_id}','${esc(it.short||it.name)}')" title="click to correct">`
       + `<td class="ic">${ic}</td>`
       + `<td class="nm" title="${it.name}">${it.short||it.name}${qty}</td>`
       + `<td class="sl">${it.width}×${it.height}</td>`
       + `<td class="ps">${fmt(it.per_slot)}</td>`
       + `<td class="val">${fmt(it.value)}</td></tr>`;
}
function dedup(items){
  // collapse identical items into one row with a count (Tushonka ×3)
  const map = new Map();
  for (const it of items){
    const k = it.id || it.name;
    if (map.has(k)) map.get(k).qty++;
    else map.set(k, {...it, qty:1});
  }
  return [...map.values()];
}
function render(items, ts){
  // dedup, then SPLIT at the median so each item is in exactly one list, ~equal length
  const sorted = dedup(items).sort((a,b)=>b.per_slot-a.per_slot);
  const mid = Math.ceil(sorted.length/2);
  const keep  = sorted.slice(0, mid);            // top half, highest ₽/slot first
  const ditch = sorted.slice(mid).reverse();     // bottom half, lowest ₽/slot first
  const fill=(id,rows)=>document.getElementById(id).innerHTML =
      rows.length ? rows.map(it=>row(it,ts)).join('') : '<tr><td class="empty">—</td></tr>';
  fill('keep', keep); fill('ditch', ditch);
}
function applyState(s){
  const st = document.getElementById('status');
  st.className = s.status;
  st.textContent = s.status === 'done' ? 'scanned ' + (s.ts||'')
                 : s.status === 'error' ? 'error: ' + (s.error||'')
                 : s.status + '…';
  if (s.result){
    const r = s.result;
    render(r.items, s.ts);
    document.getElementById('total').textContent = 'Σ ' + fmt(r.total) + ' ₽';
    document.getElementById('counts').textContent =
      `${r.identified}/${r.detections} (YOLO ${r.by_yolo} · OCR ${r.by_ocr} · fixed ${r.by_override}) · ${r.unidentified.length} unknown`;
  }
}
async function scanNow(){ await fetch('/api/scan',{method:'POST'}); }

// --- manual correction: click a row -> search -> pick the right item (manual link event) ---
let correctIcon = null, searchTimer = null;
function openCorrect(iconId, label){
  correctIcon = iconId;
  document.getElementById('modalTitle').textContent = `Correct “${label}” (icon #${iconId})`;
  document.getElementById('q').value = '';
  document.getElementById('results').innerHTML = '';
  document.getElementById('modal').style.display = 'flex';
  document.getElementById('q').focus();
}
function closeModal(){ document.getElementById('modal').style.display = 'none'; correctIcon = null; }
function doSearch(){
  clearTimeout(searchTimer);
  searchTimer = setTimeout(async () => {
    const q = document.getElementById('q').value.trim();
    if (!q){ document.getElementById('results').innerHTML = ''; return; }
    let items; try { items = await (await fetch('/api/search?q=' + encodeURIComponent(q))).json(); }
    catch(e){ return; }
    document.getElementById('results').innerHTML = items.map(it =>
      `<li onclick="pick('${it.id}')"><img class="ic" loading="lazy" src="/api/cat-icon/${it.id}" onerror="this.style.opacity=.15">`
      + `<b>${esc(it.short||it.name)}</b><span class="sub">${esc(it.name)}</span>`
      + `<span class="ps">${fmt(it.value)}</span></li>`).join('');
  }, 150);
}
async function pick(itemId){
  if (!correctIcon) return;
  await fetch('/api/override', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({icon_id: correctIcon, item_id: itemId})});
  closeModal();   // server re-projects and pushes the updated lists over SSE
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// server pushes updates instantly (no polling) — status the moment F2 fires, results when ready
const ev = new EventSource('/api/stream');
ev.onmessage = e => { try { applyState(JSON.parse(e.data)); } catch(_){} };
</script>
</body>
</html>
