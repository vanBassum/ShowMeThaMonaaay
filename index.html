<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Loot review</title>
<style>
  :root { --bg:#15171a; --panel:#1e2126; --line:#2c313a; --accent:#39d98a; --sure:#39d98a; --unc:#ffb020; --cor:#48c0ff; --txt:#d6dae0; --muted:#8b93a0; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); font:13px/1.4 system-ui, sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
  header { background:var(--panel); border-bottom:1px solid var(--line); padding:8px 12px; display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  input, button, select { background:#11141a; color:var(--txt); border:1px solid var(--line); border-radius:6px; padding:5px 8px; font:inherit; }
  input[type=text]{ width:150px; } select{ min-width:220px; max-width:340px; } button { cursor:pointer; } button:hover { border-color:var(--accent); }
  button.primary { background:var(--accent); color:#07120c; border-color:var(--accent); font-weight:600; }
  button.on { border-color:var(--accent); color:var(--accent); }
  .pill { background:#11141a; border:1px solid var(--line); border-radius:999px; padding:3px 10px; color:var(--muted); }
  #main { flex:1; display:flex; min-height:0; }
  #stage { flex:1; overflow:auto; background:#0c0e10; }
  #list { flex:1; overflow:auto; padding:10px; display:none; }
  canvas { display:block; }
  #panel { width:300px; border-left:1px solid var(--line); background:var(--panel); padding:10px; overflow:auto; display:flex; flex-direction:column; gap:8px; }
  #panel h3 { margin:4px 0; font-size:13px; color:var(--muted); font-weight:600; }
  .cand, .res { display:flex; align-items:center; gap:8px; padding:4px; border:1px solid var(--line); border-radius:6px; cursor:pointer; background:#11141a; }
  .cand:hover, .res:hover { border-color:var(--accent); }
  .cand.active, .res.active { border-color:var(--cor); background:#13212c; box-shadow:inset 3px 0 0 var(--cor); }
  .cand.active b::after, .res.active b::after { content:' ✓ current'; color:var(--cor); font-weight:400; font-size:11px; }
  .cand img, .res img, td img { width:40px; height:40px; object-fit:contain; background:#000; border-radius:4px; }
  .grid { display:flex; flex-direction:column; gap:4px; }
  table { width:100%; border-collapse:collapse; }
  th, td { text-align:left; padding:5px 8px; border-bottom:1px solid var(--line); }
  th { color:var(--muted); font-weight:600; cursor:pointer; }
  tr.fluke { opacity:.4; text-decoration:line-through; }
  tr.sel td { background:#13212c; box-shadow:inset 3px 0 0 var(--cor); }
  .dot { display:inline-block; width:9px; height:9px; border-radius:50%; }
  #overlay { position:fixed; inset:0; background:rgba(10,12,14,.7); display:none; align-items:center; justify-content:center; font-size:16px; color:var(--accent); }
  small { color:var(--muted); }
</style>
</head>
<body>
<header>
  <select id="sess" title="capture session"></select>
  <button id="reload" title="refresh session list">↻</button>
  <button id="rescan">Rescan</button>
  <button id="del" title="delete this session">🗑 Delete</button>
  <span style="width:1px;height:20px;background:var(--line)"></span>
  <input id="imp" type="text" placeholder="import file path…" />
  <button id="import">Import</button>
  <span style="width:1px;height:20px;background:var(--line)"></span>
  <button id="vScreen" class="on">Screenshot</button>
  <button id="vList">List</button>
  <span style="margin-left:auto"></span>
  <label id="vfyWrap" class="pill" style="cursor:pointer;display:flex;align-items:center;gap:6px"><input type="checkbox" id="verified" style="width:auto">looks correct</label>
  <span id="stats" class="pill">—</span>
  <span id="total" class="pill">0 ₽</span>
  <span id="saved" class="pill">—</span>
</header>

<div id="main">
  <div id="stage"><canvas id="cv"></canvas></div>
  <div id="list"></div>
  <div id="panel"><h3>select a box</h3><small>Click an item box in the screenshot to relabel it. Green = sure, orange = uncertain, blue = corrected.</small></div>
</div>
<div id="overlay">scanning…</div>

<script>
const $ = id => document.getElementById(id);
const cv = $('cv'), ctx = cv.getContext('2d'), stage = $('stage'), imgEl = new Image();
let data = null, W=0, H=0, scale=0.55, sel=-1, pan=null, space=false;
const COL = { sure:'#39d98a', uncertain:'#ffb020', corrected:'#48c0ff', fluke:'#ff5555' };

function api(p){ return fetch(p).then(r=>r.json()); }
function show(v){ $('overlay').style.display = v ? 'flex':'none'; }

async function loadSessions(want){
  const list = await api('/api/sessions');
  const selEl = $('sess'); selEl.innerHTML='';
  list.forEach(s=>{ const o=document.createElement('option'); o.value=s.id;
    const v = s.total!=null ? ` · ${s.total.toLocaleString()} ₽` : '';
    const mark = s.verified ? ' ✓' : (s.reviewed ? ' •' : '');   // ✓ you confirmed it, • edited
    o.textContent = s.id + v + mark; selEl.appendChild(o); });
  if(want && list.some(s=>s.id===want)) selEl.value=want;
  return list;
}
let loadedSession=null, knownNewest=null;
async function loadAll(force) {
  const sid = $('sess').value;
  if(!sid) return;
  show(true);
  imgEl.src = '/api/image?session=' + encodeURIComponent(sid) + '&t=' + Date.now();
  await new Promise(r => { imgEl.onload = r; imgEl.onerror = r; });
  try { data = await api('/api/scan?session=' + encodeURIComponent(sid) + (force?'&force=1':'')); }
  catch(e){ alert('scan failed: '+e); show(false); return; }
  W = data.image.width; H = data.image.height; sel=-1; loadedSession=sid;
  $('verified').checked = !!data.verified;
  resize(); draw(); renderList(); updateTotals(); selPanel();
  show(false);
}
async function init(){
  const want = new URLSearchParams(location.search).get('session');
  const list = await loadSessions(want);
  knownNewest = list.length ? list[0].id : null;
  if(!list.length){ $('panel').innerHTML='<h3>no sessions yet</h3><small>Press <b>F2</b> in-game to capture, or import a file path above.</small>'; }
  else { if(!(want && list.some(s=>s.id===want))) $('sess').value=list[0].id; loadAll(false); }
  setInterval(pollNewCapture, 2000);
}
// backend's F2 hotkey mints sessions/<ts>/; when a brand-new one appears, load it
async function pollNewCapture(){
  let list; try{ list = await api('/api/sessions'); }catch(e){ return; }
  if(!list.length) return;
  const newest = list[0].id;
  if(knownNewest!==null && newest>knownNewest){          // a fresh F2 capture
    knownNewest = newest;
    await loadSessions(newest); $('sess').value=newest; loadAll(false);
  } else { knownNewest = newest; }
}
function resize(){ cv.width=Math.round(W*scale); cv.height=Math.round(H*scale); }

function draw(){
  if(!W) return;
  ctx.setTransform(scale,0,0,scale,0,0);
  ctx.clearRect(0,0,W,H); ctx.drawImage(imgEl,0,0,W,H);
  ctx.font=`${13/scale}px system-ui`; ctx.textBaseline='bottom';
  // draw unselected (thin) first, selected last (on top, highlighted)
  const order=data.items.map((_,i)=>i).filter(i=>i!==sel); if(sel>=0) order.push(sel);
  for(const i of order){
    const it=data.items[i], [x0,y0,x1,y1]=it.box, w=x1-x0, h=y1-y0, c=COL[it.status]||'#999', on=i===sel;
    if(on){
      ctx.globalAlpha=0.18; ctx.fillStyle=c; ctx.fillRect(x0,y0,w,h); ctx.globalAlpha=1;
      ctx.strokeStyle='#fff'; ctx.lineWidth=5/scale; ctx.strokeRect(x0,y0,w,h);   // white halo
      ctx.strokeStyle=c;      ctx.lineWidth=2.5/scale; ctx.strokeRect(x0,y0,w,h);
    } else {
      ctx.globalAlpha = it.status==='fluke' ? 0.25 : 1;
      ctx.strokeStyle=c; ctx.lineWidth=1.3/scale; ctx.strokeRect(x0,y0,w,h);
      ctx.globalAlpha=1;
    }
    ctx.globalAlpha = (!on && it.status==='fluke') ? 0.25 : 1;
    ctx.fillStyle=on?'#fff':c; ctx.fillText((it.short||'?'), x0+2/scale, y0-2/scale);
    ctx.globalAlpha=1;
  }
}
function hit(p){ for(let i=data.items.length-1;i>=0;i--){ const [a,b,c,d]=data.items[i].box; if(p.x>=a&&p.x<=c&&p.y>=b&&p.y<=d) return i; } return -1; }
// all boxes under p, smallest-first (so stacked boxes are reachable by repeated clicks)
function hitsAt(p){ const r=[]; data.items.forEach((it,i)=>{ const [a,b,c,d]=it.box; if(p.x>=a&&p.x<=c&&p.y>=b&&p.y<=d) r.push(i); });
  return r.sort((i,j)=>{ const A=data.items[i].box, B=data.items[j].box; return (A[2]-A[0])*(A[3]-A[1])-(B[2]-B[0])*(B[3]-B[1]); }); }
function cycleSelect(p){ const hs=hitsAt(p); if(!hs.length){ sel=-1; return; } const k=hs.indexOf(sel); sel=hs[(k+1)%hs.length]; }
// the next item to review after `curIdx`, in the order shown in the Grab list
// (so culling a fluke lands on the item the user actually sees next, not an
// overlapping/duplicate detection). Call BEFORE marking curIdx a fluke. -1 if none.
function nextInListOrder(curIdx){
  if(!data) return -1;
  const col=COLS.find(c=>c.k===sortL.k)||COLS[1];
  const ord=data.items.map((it,i)=>({it,i})).filter(x=>x.it.status!=='fluke')
    .sort((a,b)=>{ const va=col.val(a.it),vb=col.val(b.it); return (va<vb?-1:va>vb?1:0)*sortL.dir; });
  if(ord.length<=1) return -1;                       // current is the only one left
  const pos=ord.findIndex(x=>x.i===curIdx);
  if(pos<0) return ord[0].i;
  return pos+1<ord.length ? ord[pos+1].i : ord[pos-1].i;   // next, or new-last
}
function evToImg(e){ const r=cv.getBoundingClientRect(); return {x:(e.clientX-r.left)/scale,y:(e.clientY-r.top)/scale}; }

// ---- selection panel ----
function cropPreview(it){
  const [x0,y0,x1,y1]=it.box, w=x1-x0, h=y1-y0, s=Math.min(260/w,260/h,3);
  const c=document.createElement('canvas'); c.width=w*s; c.height=h*s;
  c.getContext('2d').drawImage(imgEl, x0,y0,w,h, 0,0,w*s,h*s);
  c.style.background='#000'; c.style.borderRadius='6px'; c.style.maxWidth='100%'; return c;
}
let saveT;
function autosave(){
  if(!data) return;
  clearTimeout(saveT); $('saved').textContent='saving…';
  saveT=setTimeout(async()=>{
    try{ const r=await fetch('/api/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
      const j=await r.json(); $('saved').textContent=`saved · gallery ${j.gallery_total}`; }
    catch(e){ $('saved').textContent='save failed'; }
  },400);
}
function assign(it, item){
  it.id=item.id; it.short=item.short||item.shortName||''; it.name=item.name||'';
  if(item.price!=null) it.price=item.price;
  if(item.slots!=null) it.slots=item.slots;
  it.status='corrected'; it.corrected=true;
  draw(); renderList(); updateTotals(); selPanel(); autosave();
}
function selPanel(){
  const p=$('panel'); p.innerHTML='';
  if(sel<0){ p.innerHTML='<h3>select a box</h3><small>Click an item box; click again to cycle stacked boxes. Green=sure, orange=uncertain, blue=corrected. The AI\'s pick is pre-selected in the list.</small>'; return; }
  const it=data.items[sel];
  p.appendChild(cropPreview(it));
  const fl=document.createElement('button'); fl.textContent = it.status==='fluke'?'unmark fluke':'mark as fluke';
  fl.onclick=()=>{ const marking = it.status!=='fluke';
    const next = marking ? nextInListOrder(sel) : -1;   // pick next BEFORE status change
    it.status = marking ? 'fluke' : 'uncertain';
    if(marking) sel = next;                             // jump to next so culling is a fast pass
    draw(); renderList(); updateTotals(); selPanel(); autosave(); };
  p.appendChild(fl);
  const ch=document.createElement('div'); ch.innerHTML='<h3>suggestions</h3>'; const cg=document.createElement('div'); cg.className='grid';
  it.candidates.forEach(c=>{ const d=document.createElement('div'); d.className='cand'+(c.id===it.id?' active':'');
    d.innerHTML=`<img src="/api/icon?id=${c.id}"><div><b>${c.short}</b> <small>${c.prob}</small><br><small>${c.name}</small></div>`;
    d.onclick=()=>assign(it,c); cg.appendChild(d); });
  ch.appendChild(cg); p.appendChild(ch);
  const sh=document.createElement('div'); sh.innerHTML='<h3>search</h3>';
  const si=document.createElement('input'); si.type='text'; si.placeholder='type item name…'; si.style.width='100%';
  const sr=document.createElement('div'); sr.className='grid'; sr.style.marginTop='6px';
  let t; si.oninput=()=>{ clearTimeout(t); t=setTimeout(async()=>{
    const res=await api('/api/search?q='+encodeURIComponent(si.value)); sr.innerHTML='';
    res.forEach(r=>{ const d=document.createElement('div'); d.className='res'+(r.id===it.id?' active':'');
      d.innerHTML=`<img src="/api/icon?id=${r.id}"><div><b>${r.short}</b><br><small>${r.name} · ${r.price.toLocaleString()}₽</small></div>`;
      d.onclick=()=>assign(it,r); sr.appendChild(d); }); },180); };
  sh.appendChild(si); sh.appendChild(sr); p.appendChild(sh); si.focus();
}

// ---- list view: two sortable tables (grab vs skip), clickable headers ----
const COLS=[ {k:'short',label:'item',val:it=>(it.short||'').toLowerCase()},
  {k:'perslot',label:'₽/slot',val:it=>it.price/Math.max(1,it.slots)},
  {k:'price',label:'₽',val:it=>it.price},
  {k:'conf',label:'conf',val:it=>it.prob} ];
let sortL={k:'perslot',dir:-1}, sortR={k:'perslot',dir:1};
function buildTable(title, s, side){
  const col=COLS.find(c=>c.k===s.k);
  const rows=data.items.map((it,i)=>({it,i})).filter(x=>x.it.status!=='fluke')
    .sort((a,b)=>{ const va=col.val(a.it),vb=col.val(b.it); return (va<vb?-1:va>vb?1:0)*s.dir; });
  let h=`<div style="flex:1;min-width:0"><h3 style="color:var(--muted);margin:4px 0">${title}</h3><table><tr><th></th>`;
  COLS.forEach(c=>{ const ar=s.k===c.k?(s.dir<0?' ▼':' ▲'):''; h+=`<th data-col="${c.k}" data-side="${side}">${c.label}${ar}</th>`; });
  h+='</tr>';
  for(const {it,i} of rows){
    h+=`<tr data-i="${i}" class="${i===sel?'sel':''}" style="cursor:pointer"><td><img src="/api/icon?id=${it.id}"></td>`+
      `<td>${it.short}<br><small>${it.name}</small></td>`+
      `<td>${Math.round(it.price/Math.max(1,it.slots)).toLocaleString()}</td>`+
      `<td>${it.price.toLocaleString()}</td>`+
      `<td><span class="dot" style="background:${COL[it.status]}"></span> ${(+it.prob).toFixed(2)}</td></tr>`;
  }
  return h+'</table></div>';
}
function renderList(){
  $('list').innerHTML=`<div style="display:flex;gap:16px">`+
    buildTable('Grab — most ₽/slot',sortL,'L')+buildTable('Skip — least ₽/slot',sortR,'R')+`</div>`;
  $('list').querySelectorAll('th[data-col]').forEach(th=>th.onclick=()=>{
    const s=th.dataset.side==='L'?sortL:sortR, k=th.dataset.col;
    if(s.k===k) s.dir*=-1; else { s.k=k; s.dir=(k==='short')?1:-1; }
    renderList(); });
  $('list').querySelectorAll('tr[data-i]').forEach(tr=>tr.onclick=()=>{ sel=+tr.dataset.i; selPanel(); draw(); renderList(); });
  const selRow=$('list').querySelector('tr.sel'); if(selRow) selRow.scrollIntoView({block:'nearest'});
}
function updateTotals(){
  const act=data.items.filter(it=>it.status!=='fluke');
  const tot=act.reduce((s,it)=>s+(it.price||0),0);
  $('total').textContent=tot.toLocaleString()+' ₽';
  const unc=data.items.filter(it=>it.status==='uncertain').length;
  $('stats').textContent=`${act.length} items · ${unc} uncertain`;
}

// ---- view toggle ----
function viewScreen(){ $('stage').style.display=''; $('list').style.display='none'; $('vScreen').classList.add('on'); $('vList').classList.remove('on'); }
function viewList(){ $('stage').style.display='none'; $('list').style.display='block'; $('vList').classList.add('on'); $('vScreen').classList.remove('on'); }

// ---- mouse: select / pan / zoom ----
cv.addEventListener('mousedown',e=>{ if(e.button===1||(e.button===0&&space)){ pan={x:e.clientX,y:e.clientY,sl:stage.scrollLeft,st:stage.scrollTop}; cv.style.cursor='grabbing'; e.preventDefault(); return; }
  if(e.button!==0||!data) return; cycleSelect(evToImg(e)); draw(); selPanel(); });
window.addEventListener('mousemove',e=>{ if(pan){ stage.scrollLeft=pan.sl-(e.clientX-pan.x); stage.scrollTop=pan.st-(e.clientY-pan.y); } });
window.addEventListener('mouseup',()=>{ if(pan){ pan=null; cv.style.cursor=space?'grab':'default'; } });
cv.addEventListener('contextmenu',e=>{ e.preventDefault(); if(!data) return; const i=hit(evToImg(e)); if(i<0) return; const it=data.items[i]; it.status = it.status==='fluke'?'uncertain':'fluke'; draw(); renderList(); updateTotals(); autosave(); });
cv.addEventListener('wheel',e=>{ e.preventDefault(); const r=cv.getBoundingClientRect(); const ix=(e.clientX-r.left)/scale, iy=(e.clientY-r.top)/scale;
  scale=Math.min(3,Math.max(0.1,scale*(e.deltaY<0?1.1:1/1.1))); resize(); draw();
  const sr=stage.getBoundingClientRect(); stage.scrollLeft=ix*scale-(e.clientX-sr.left); stage.scrollTop=iy*scale-(e.clientY-sr.top); }, {passive:false});
document.addEventListener('keydown',e=>{ if(e.target.tagName==='INPUT') return; if(e.code==='Space'){ space=true; cv.style.cursor='grab'; e.preventDefault(); } });
document.addEventListener('keyup',e=>{ if(e.code==='Space'){ space=false; cv.style.cursor='default'; } });

// ---- toolbar ----
$('sess').onchange=()=>loadAll(false);
$('reload').onclick=()=>loadSessions($('sess').value).then(()=>loadAll(false));
$('rescan').onclick=()=>loadAll(true);
$('import').onclick=async()=>{
  const path=$('imp').value.trim(); if(!path) return;
  let r; try{ r=await api('/api/import?path='+encodeURIComponent(path)); }catch(e){ alert('import failed: '+e); return; }
  if(r&&r.id){ await loadSessions(r.id); $('sess').value=r.id; $('imp').value=''; loadAll(false); } else alert('import failed');
};
$('verified').onchange=()=>{
  if(!data){ $('verified').checked=false; return; }
  data.verified = $('verified').checked;
  autosave();                                            // persists into corrected.json
  setTimeout(()=>loadSessions($('sess').value), 700);    // refresh the ✓ marker in the picker
};
$('imp').addEventListener('keydown',e=>{ if(e.key==='Enter') $('import').click(); });
$('del').onclick=async()=>{
  const sid=$('sess').value; if(!sid) return;
  if(!confirm(`Delete session ${sid}?\nRemoves its screenshot, scan, corrections, and any banked crops.`)) return;
  try{ await fetch('/api/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session:sid})}); }
  catch(e){ alert('delete failed: '+e); return; }
  const list=await loadSessions();
  knownNewest = list.length ? list[0].id : null;
  if(list.length){ $('sess').value=list[0].id; loadAll(false); }
  else { data=null; sel=-1; loadedSession=null; ctx.clearRect(0,0,cv.width,cv.height);
    $('total').textContent='0 ₽'; $('stats').textContent='—';
    $('panel').innerHTML='<h3>no sessions</h3><small>Press <b>F2</b> in-game to capture.</small>';
    $('list').innerHTML=''; }
};
$('vScreen').onclick=viewScreen; $('vList').onclick=viewList;

init();
</script>
</body>
</html>
