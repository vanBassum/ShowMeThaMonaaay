<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Box labeler</title>
<style>
  :root { --bg:#15171a; --panel:#1e2126; --line:#2c313a; --accent:#39d98a; --sel:#ffd200; --txt:#d6dae0; --muted:#8b93a0; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); font:13px/1.4 system-ui, sans-serif; }
  header { background:var(--panel); border-bottom:1px solid var(--line); padding:8px 12px;
           display:flex; flex-wrap:wrap; gap:10px 16px; align-items:center; position:sticky; top:0; z-index:5; }
  .grp { display:flex; align-items:center; gap:6px; }
  .grp label { color:var(--muted); }
  input[type=text]{ width:170px; }
  input, button { background:#11141a; color:var(--txt); border:1px solid var(--line); border-radius:6px; padding:5px 8px; font:inherit; }
  button { cursor:pointer; } button:hover { border-color:var(--accent); }
  button.primary { background:var(--accent); color:#07120c; border-color:var(--accent); font-weight:600; }
  .pill { background:#11141a; border:1px solid var(--line); border-radius:999px; padding:3px 10px; color:var(--muted); }
  #stage { padding:12px; overflow:auto; max-height:calc(100vh - 230px); }
  canvas { background:#000; box-shadow:0 0 0 1px var(--line); }
  #hint { padding:8px 12px; color:var(--muted); border-top:1px solid var(--line); background:var(--panel); }
  #hint b { color:var(--txt); } kbd { background:#11141a; border:1px solid var(--line); border-bottom-width:2px; border-radius:4px; padding:0 5px; font-size:11px; }
  footer { display:flex; gap:12px; align-items:flex-start; padding:10px 12px; border-top:1px solid var(--line); background:var(--panel); }
  textarea { flex:1; height:90px; background:#11141a; color:var(--txt); border:1px solid var(--line); border-radius:6px; font:12px ui-monospace, monospace; padding:8px; resize:vertical; }
</style>
</head>
<body>
<header>
  <div class="grp"><label>image</label><input id="imgPath" type="text" value="test screenshot 1.png" /><button id="loadImg">Load</button></div>
  <div class="grp"><label>zoom</label><input id="zoom" type="range" min="0.25" max="1.5" step="0.05" value="0.6" /><span id="zoomVal" class="pill">60%</span></div>
  <div class="grp" style="margin-left:auto">
    <span id="sel" class="pill">none</span>
    <span id="count" class="pill">0 boxes</span>
    <button id="loadLabelsBtn">Load labels</button>
    <input id="loadLabels" type="file" accept=".json,.txt" style="display:none" />
    <button id="clear">Clear</button>
    <button id="exportYolo">Export YOLO</button>
    <button id="exportJson" class="primary">Export JSON</button>
  </div>
</header>

<div id="stage"><canvas id="cv"></canvas></div>

<div id="hint">
  <b>Drag empty area</b> = new box · <b>click</b> = select · drag <b>corners/edges</b> = resize · drag <b>body</b> = move ·
  <b>double-click</b> = rename · <b>right-click</b> or <kbd>Del</kbd> = delete · <kbd>Esc</kbd> = deselect ·
  your <code>.labels.json</code> auto-loads (scaled to the real image)
</div>

<footer>
  <textarea id="out" readonly placeholder="Export preview…"></textarea>
  <button id="copy">Copy</button>
</footer>

<script>
const cv = document.getElementById('cv'), ctx = cv.getContext('2d'), img = new Image();
let W = 0, H = 0, scale = 0.6;
let boxes = [];                 // {x0,y0,x1,y1,name} in REAL image px
let sel = -1, action = null;    // action: {type:'create'|'move'|'resize', handle, ...}
let hover = null;
const $ = id => document.getElementById(id);
const HANDLES = ['nw','n','ne','e','se','s','sw','w'];
const CURSORS = { nw:'nwse-resize', se:'nwse-resize', ne:'nesw-resize', sw:'nesw-resize', n:'ns-resize', s:'ns-resize', e:'ew-resize', w:'ew-resize' };

function loadImage() {
  const name = $('imgPath').value.trim();
  img.onload = () => { W = img.naturalWidth; H = img.naturalHeight; resize(); draw(); autoLoadLabels(name); };
  img.onerror = () => alert('Could not load "' + name + '" (must sit next to index.html).');
  img.src = encodeURI(name) + '?t=' + Date.now();
}
function resize() { cv.width = Math.round(W*scale); cv.height = Math.round(H*scale); }
function evToImg(e){ const r = cv.getBoundingClientRect(); return { x:(e.clientX-r.left)/scale, y:(e.clientY-r.top)/scale }; }
function norm(b){ return { x0:Math.min(b.x0,b.x1), y0:Math.min(b.y0,b.y1), x1:Math.max(b.x0,b.x1), y1:Math.max(b.y0,b.y1), name:b.name }; }

// ---- labels: load your JSON {image:{width,height}, items:[{name,x,y,w,h}]} (scaled) ----
function applyJson(d) {
  const sw = W / (d.image?.width || W), sh = H / (d.image?.height || H);
  boxes = (d.items || []).map(it => ({
    x0: it.x*sw, y0: it.y*sh, x1:(it.x+it.w)*sw, y1:(it.y+it.h)*sh, name: it.name || 'item' }));
  sel = -1; draw();
}
function applyYolo(txt) {
  boxes = txt.split('\n').map(l => l.trim().split(/\s+/)).filter(p => p.length===5)
    .map(([_,cx,cy,bw,bh]) => ({ x0:(+cx-+bw/2)*W, y0:(+cy-+bh/2)*H, x1:(+cx+ +bw/2)*W, y1:(+cy+ +bh/2)*H, name:'item' }));
  sel = -1; draw();
}
function autoLoadLabels(name) {
  if (boxes.length) return;                          // don't clobber existing edits
  const base = name.replace(/\.[^.]+$/, '');
  fetch(encodeURI(base + '.labels.json') + '?t=' + Date.now())
    .then(r => r.ok ? r.json() : null).then(d => { if (d) applyJson(d); }).catch(() => {});
}

function draw() {
  if (!W) return;
  ctx.setTransform(scale,0,0,scale,0,0);
  ctx.clearRect(0,0,W,H); ctx.drawImage(img,0,0,W,H);
  ctx.lineWidth = 2/scale; ctx.font = `${13/scale}px system-ui`; ctx.textBaseline = 'bottom';
  boxes.forEach((b,i) => {
    const on = i === sel;
    ctx.strokeStyle = on ? 'var(--sel)' : '#39d98a';
    ctx.strokeStyle = on ? '#ffd200' : '#39d98a';
    ctx.fillStyle = on ? 'rgba(255,210,0,0.14)' : 'rgba(57,217,138,0.12)';
    ctx.fillRect(b.x0,b.y0,b.x1-b.x0,b.y1-b.y0);
    ctx.strokeRect(b.x0,b.y0,b.x1-b.x0,b.y1-b.y0);
    ctx.fillStyle = on ? '#ffd200' : '#39d98a';
    if (b.name) ctx.fillText(b.name, b.x0+2/scale, b.y0-2/scale);
    if (on) { ctx.fillStyle = '#ffd200'; const s = 8/scale;
      handlePts(b).forEach(p => ctx.fillRect(p.x-s/2, p.y-s/2, s, s)); }
  });
  // creating
  if (action && action.type === 'create') {
    const b = norm(action.box);
    ctx.strokeStyle = '#ffd200'; ctx.fillStyle = 'rgba(255,210,0,0.18)';
    ctx.fillRect(b.x0,b.y0,b.x1-b.x0,b.y1-b.y0); ctx.strokeRect(b.x0,b.y0,b.x1-b.x0,b.y1-b.y0);
  }
  updateOut();
}
function handlePts(b){ const mx=(b.x0+b.x1)/2, my=(b.y0+b.y1)/2; return [
  {h:'nw',x:b.x0,y:b.y0},{h:'n',x:mx,y:b.y0},{h:'ne',x:b.x1,y:b.y0},{h:'e',x:b.x1,y:my},
  {h:'se',x:b.x1,y:b.y1},{h:'s',x:mx,y:b.y1},{h:'sw',x:b.x0,y:b.y1},{h:'w',x:b.x0,y:my}]; }

function hitHandle(b,p){ const tol=8/scale; for(const pt of handlePts(b)) if(Math.abs(p.x-pt.x)<tol&&Math.abs(p.y-pt.y)<tol) return pt.h; return null; }
function hitBox(p){ for(let i=boxes.length-1;i>=0;i--){ const b=boxes[i]; if(p.x>=b.x0&&p.x<=b.x1&&p.y>=b.y0&&p.y<=b.y1) return i; } return -1; }

function updateOut(){
  $('count').textContent = boxes.length+' boxes';
  $('sel').textContent = sel>=0 ? (boxes[sel].name||'(unnamed)') : 'none';
  $('out').value = JSON.stringify({ image:{width:W,height:H}, items: boxes.map(b => ({
    name:b.name, x:Math.round(b.x0), y:Math.round(b.y0), w:Math.round(b.x1-b.x0), h:Math.round(b.y1-b.y0) })) }, null, 1);
}

// ---- mouse ----
cv.addEventListener('mousedown', e => {
  if (e.button!==0) return;
  const p = evToImg(e);
  if (sel>=0) { const h = hitHandle(boxes[sel],p); if (h){ action={type:'resize',handle:h}; return; } }
  const i = hitBox(p);
  if (i>=0){ sel=i; action={type:'move', last:p}; draw(); return; }
  sel=-1; action={type:'create', box:{x0:p.x,y0:p.y,x1:p.x,y1:p.y,name:'item'}}; draw();
});
cv.addEventListener('mousemove', e => {
  const p = evToImg(e); hover=p;
  if (action){
    if (action.type==='create'){ action.box.x1=p.x; action.box.y1=p.y; }
    else if (action.type==='move'){ const b=boxes[sel],dx=p.x-action.last.x,dy=p.y-action.last.y;
      b.x0+=dx;b.x1+=dx;b.y0+=dy;b.y1+=dy; action.last=p; }
    else if (action.type==='resize'){ const b=boxes[sel],h=action.handle;
      if(h.includes('w')) b.x0=p.x; if(h.includes('e')) b.x1=p.x;
      if(h.includes('n')) b.y0=p.y; if(h.includes('s')) b.y1=p.y; }
    draw();
  } else {                                  // cursor feedback
    let c='crosshair';
    if (sel>=0){ const h=hitHandle(boxes[sel],p); if(h) c=CURSORS[h]; else if(hitBox(p)>=0) c='move'; }
    else if (hitBox(p)>=0) c='move';
    cv.style.cursor=c;
  }
});
window.addEventListener('mouseup', () => {
  if (!action) return;
  if (action.type==='create'){ const b=norm(action.box);
    if (b.x1-b.x0>4 && b.y1-b.y0>4){ boxes.push(b); sel=boxes.length-1; } }
  else if (sel>=0){ boxes[sel]=norm(boxes[sel]); }   // fix any flipped edges
  action=null; draw();
});
cv.addEventListener('contextmenu', e => { e.preventDefault(); const i=hitBox(evToImg(e)); if(i>=0){ boxes.splice(i,1); sel=-1; draw(); } });
cv.addEventListener('dblclick', e => { const i=hitBox(evToImg(e)); if(i>=0){ const n=prompt('Item name:', boxes[i].name||''); if(n!==null){ boxes[i].name=n; draw(); } } });

document.addEventListener('keydown', e => {
  if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if ((e.key==='Delete'||e.key==='Backspace') && sel>=0){ boxes.splice(sel,1); sel=-1; draw(); e.preventDefault(); }
  else if (e.key==='Escape'){ sel=-1; action=null; draw(); }
});

// ---- toolbar ----
$('loadImg').onclick = loadImage;
$('zoom').oninput = e => { scale=+e.target.value; $('zoomVal').textContent=Math.round(scale*100)+'%'; resize(); draw(); };
$('clear').onclick = () => { if(confirm('Remove all boxes?')){ boxes=[]; sel=-1; draw(); } };
$('loadLabelsBtn').onclick = () => $('loadLabels').click();
$('loadLabels').onchange = e => { const f=e.target.files[0]; if(!f) return; const r=new FileReader();
  r.onload = () => { try { applyJson(JSON.parse(r.result)); } catch { applyYolo(r.result); } }; r.readAsText(f); };
function download(name, text){ const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([text],{type:'text/plain'})); a.download=name; a.click(); }
$('exportJson').onclick = () => download($('imgPath').value.trim().replace(/\.[^.]+$/,'')+'.labels.json', $('out').value);
$('exportYolo').onclick = () => { const txt = boxes.map(b => `0 ${((b.x0+b.x1)/2/W).toFixed(6)} ${((b.y0+b.y1)/2/H).toFixed(6)} ${((b.x1-b.x0)/W).toFixed(6)} ${((b.y1-b.y0)/H).toFixed(6)}`).join('\n');
  download($('imgPath').value.trim().replace(/\.[^.]+$/,'')+'.txt', txt+'\n'); };
$('copy').onclick = () => { $('out').select(); document.execCommand('copy'); };

loadImage();
</script>
</body>
</html>
